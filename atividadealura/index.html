<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        img {
            width: 80px;
            height: 80px;
        }
        
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
        }

        header {
            background-color: #1b0fc2; 
            color: white;
            text-align: center;
            padding: 30px 10px;
            border: 4px solid #fffb00;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        header p {
            margin: 0;
            font-size: 14px;
            font-weight: lighter;
        }

        article h2 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .author {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
        }

        .content {
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meu blog pokemon</h1>
        <p>Vou compartilhar conhecimentos sobre Pokemons</p>
    </header>
    <img src="pokemon.png" alt="pokemon logo">
    <article>
        <h2>Meu primeiro post</h2>
        <div class="author">Por: Vitor Daniel</div>
        <div class="content">
            Boas-vindas ao meu novo blog! Aqui vou compartilhar curiosidades sobre pokemons.
        </div>
    </article>

</body>
</html>
